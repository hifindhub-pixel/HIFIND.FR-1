name: Sync Products

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install pg

      - name: Run sync
        run: node scripts/sync.js
        env:
          AFFILAE_TOKEN:        ${{ secrets.AFFILAE_TOKEN }}
          NEON_URL:             ${{ secrets.NEON_URL }}
          EFFINITY_FEEDS:       ${{ secrets.EFFINITY_FEEDS }}
